name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest on VPS and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e

            # Pre-flight: /var/www/html must be a git checkout for this strategy.
            # If you have not bootstrapped yet, run on the VPS once:
            #   sudo rm -rf /var/www/html
            #   sudo git clone https://github.com/max994-dev/privacyduck.git /var/www/html
            #   sudo chown -R www-data:www-data /var/www/html   # adjust user as needed
            if [ ! -d /var/www/html/.git ]; then
              echo "ERROR: /var/www/html is not a git checkout."
              echo "Bootstrap manually with the commands above and re-run this workflow."
              exit 1
            fi

            cd /var/www/html

            # Fetch and force-sync to origin/main. We discard any local changes
            # on the VPS - the source of truth is GitHub.
            git fetch --all --prune
            git reset --hard origin/main

            # PHP deps if composer is used.
            if [ -f composer.json ]; then
              composer install --no-dev --optimize-autoloader --no-interaction || true
            fi

            # Restart web servers (whichever is running).
            systemctl restart apache2 || true
            systemctl restart nginx || true

            # Best-effort opcache reset so new PHP loads immediately rather
            # than after the next FPM/Apache worker cycle.
            php -r 'if (function_exists("opcache_reset")) { opcache_reset(); }' 2>/dev/null || true

            echo "Deployed:"
            git log -1 --pretty=format:'%h %s'
