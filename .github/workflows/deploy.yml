name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Write key from a multiline env var, strip Windows CRLF, ensure trailing newline.
      # We do not run `ssh-keygen -y` here: a bad paste can make OpenSSL report "string is too large"
      # (corrupt ASN.1) while the only fix is to re-paste a clean key. appleboy/Go will still fail
      # if the key is unusable, with a clearer follow-up.
      - name: Prepare SSH private key
        id: sshkey
        run: |
          set -euo pipefail
          umask 077
          # Must live under GITHUB_WORKSPACE: appleboy's container only mounts the repo root.
          KEY_FILE="${GITHUB_WORKSPACE}/.github_deploy_key"
          # One trailing newline after the block (avoids "invalid format" on some clients)
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > "$KEY_FILE"
          if [ ! -s "$KEY_FILE" ]; then
            echo "::error::Repository secret VPS_SSH_KEY is empty. Add it under Settings → Secrets and variables → Actions (name: VPS_SSH_KEY). Value must be the full private key file (e.g. id_ed25519), not the .pub file."
            exit 1
          fi
          SZ=$(wc -c < "$KEY_FILE" | tr -d ' ')
          if [ "$SZ" -lt 200 ] || [ "$SZ" -gt 20000 ]; then
            echo "::error::VPS_SSH_KEY size is ${SZ} bytes (expected roughly 200-20000). You may have pasted the wrong text, a truncated key, or something other than a single private key file."
            exit 1
          fi
          if ! head -1 "$KEY_FILE" | grep -qE '^-+(BEGIN|OPENSSH)'; then
            echo "::error::VPS_SSH_KEY must be a private key. First line should be like: -----BEGIN OPENSSH PRIVATE KEY----- or -----BEGIN ... PRIVATE KEY-----"
            exit 1
          fi
          BEGINS=$(grep -c '^-----BEGIN' "$KEY_FILE" || true)
          if [ "$BEGINS" -ne 1 ]; then
            echo "::error::Found ${BEGINS} '-----BEGIN' line(s) in VPS_SSH_KEY. Paste exactly one private key (one BEGIN/END block), not several keys or extra text."
            exit 1
          fi
          chmod 600 "$KEY_FILE"
          echo "key_path=.github_deploy_key" >> "$GITHUB_OUTPUT"
          if [ -n "${VPS_PORT:-}" ]; then
            echo "port=${VPS_PORT}" >> "$GITHUB_OUTPUT"
          else
            echo "port=22" >> "$GITHUB_OUTPUT"
          fi
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        shell: bash

      - name: Copy project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ steps.sshkey.outputs.port }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ steps.sshkey.outputs.key_path }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "."
          target: "/tmp/privacyduck-release"
          rm: true
          overwrite: true
          strip_components: 0

      - name: Activate release on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ steps.sshkey.outputs.port }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ steps.sshkey.outputs.key_path }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e

            mkdir -p /var/www/html

            rsync -av --delete \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "storage/logs" \
              --exclude "assets/uploads" \
              --exclude ".env" \
              --exclude ".env.*" \
              /tmp/privacyduck-release/ /var/www/html/

            cd /var/www/html

            if [ -f composer.json ]; then
              composer install --no-dev --optimize-autoloader --no-interaction || true
            fi

            systemctl restart apache2 || true
            systemctl restart nginx || true
