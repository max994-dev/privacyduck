name: Deploy to VPS

# Build Tailwind CSS in CI (no Node toolchain on the VPS), then deploy
# code via git pull + ship the freshly-built CSS via scp afterwards.
#
# Why this matters: before May 2026 someone was running
# `npm run build:css` locally and committing the output to git. When
# that stopped, every new CSS utility class added in PHP got purged
# from the production stylesheet because the CSS was stale. Concrete
# symptom: dashboard `lg:col-span-2` was missing for days, hero card
# squished into 1/4 width.
#
# Auth: SSH key from secret VPS_SSH_KEY (the VPS has
# PasswordAuthentication=no, so the previous sshpass+password approach
# was silently failing every push).

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci --no-audit --no-fund

      - name: Build Tailwind CSS
        # Outputs to ./assets/css/tailwind-built.css. Scans every
        # PHP/JS file listed in tailwind.config.js content[], so any
        # new utility class added since last build is now included.
        run: npm run build:css

      - name: Sanity-check built CSS exists
        run: |
          test -s assets/css/tailwind-built.css || { echo "ERR: tailwind-built.css empty/missing after build"; exit 1; }
          echo "built CSS: $(wc -c < assets/css/tailwind-built.css) bytes"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy code (git pull on VPS)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 \
            "$VPS_USER@$VPS_HOST" \
            'bash -s' << 'REMOTE'
              set -u
              cd /var/www/html || { echo "ERR: cannot cd /var/www/html"; exit 1; }
              if [ ! -d .git ]; then
                echo "ERR: /var/www/html is not a git checkout. Bootstrap with:"
                echo "  sudo rm -rf /var/www/html && sudo git clone https://github.com/max994-dev/privacyduck.git /var/www/html"
                exit 1
              fi
              git fetch --all --prune || { echo "ERR: git fetch failed"; exit 1; }
              git reset --hard origin/main || { echo "ERR: git reset failed"; exit 1; }
              if [ -f composer.json ] && command -v composer >/dev/null 2>&1; then
                composer install --no-dev --optimize-autoloader --no-interaction >/tmp/composer.log 2>&1 || true
              fi
              echo "Pulled: $(git log -1 --pretty=format:'%h %s' 2>/dev/null || echo unknown)"
              exit 0
          REMOTE

      - name: Upload freshly-built Tailwind CSS (overwrites git's stale copy)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -o ConnectTimeout=30 \
            assets/css/tailwind-built.css \
            "$VPS_USER@$VPS_HOST:/var/www/html/assets/css/tailwind-built.css"

      - name: Restart web servers
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o ConnectTimeout=30 \
            "$VPS_USER@$VPS_HOST" \
            'systemctl restart apache2 >/dev/null 2>&1 || true; systemctl restart nginx >/dev/null 2>&1 || true; echo "Servers restarted"; ls -la /var/www/html/assets/css/tailwind-built.css'
